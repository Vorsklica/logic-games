<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Input</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game">
      <!-- Заголовок -->

      <h1 id="game-title" class="game__title"></h1>

      <!-- Умова -->

      <section class="game__task">
        <p id="question" class="game__question"></p>

        <div class="game__image-container">
          <img id="task-image" class="game__image" alt="Ілюстрація до задачі" />
        </div>

        <div class="game__input-panel">
          <input
            id="answer-input"
            class="game__input"
            type="text"
            placeholder="Введіть відповідь..."
            autocomplete="off"
            spellcheck="false"
            maxlength="100"
          />
        </div>

        <div class="game__button-panel">
          <button id="check-button" class="game__button">Перевірити</button>
        </div>

        <div id="message" class="game__message"></div>
      </section>

      <!-- Нижній колонтитул -->

      <footer class="game__footer">
        <span class="game__footer-logo"> 🧩 </span>

        <span class="game__footer-text"> Powered by Logic Games lab </span>
      </footer>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
