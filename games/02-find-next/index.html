<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Find Next</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="game">
      <div id="game-screen" class="screen">
        <h1 id="game-title"></h1>

        <div id="progress"></div>

        <div id="sequence" class="sequence">
          <!-- Послідовність -->
        </div>

        <div id="instruction" class="instruction"></div>

        <div id="answers" class="answers">
          <!-- Варіанти відповідей -->
        </div>

        <div id="result-panel">
          <div id="message"></div>

          <div class="button-panel">
            <button id="next-button" class="game-button" hidden>Далі</button>
          </div>
        </div>
      </div>

      <div id="result-screen" class="screen" hidden>
        <div id="result-title" class="result-title">Результат</div>

        <div id="result-percent" class="result-percent"></div>

        <div id="result-score" class="result-score"></div>

        <div id="result-emoji" class="result-emoji"></div>
      </div>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
