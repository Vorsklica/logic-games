<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Games</title>
</head>
<body>
    <h1>Ласкаво просимо!</h1>
    <p>Це лобораторія логічних ігор</p>
    <p>Перша гра вже в розробці</p>
    </br>
    <p>Майстерня головоломок починає свою роботу.</p>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram.WebApp;

tg.ready();

const info = document.createElement("pre");

info.style.background = "#f4f4f4";
info.style.padding = "10px";
info.style.border = "1px solid #ccc";

info.textContent =
"platform : " + tg.platform + "\n" +
"version  : " + tg.version + "\n" +
"color    : " + tg.colorScheme + "\n" +
"initData : " + (tg.initData ? "Є" : "Немає");

document.body.appendChild(info);
</script>
</body>
</html>
